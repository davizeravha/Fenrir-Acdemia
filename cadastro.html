<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenrir Academia - Cadastro</title>
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        
        <div class="login-header">
            <div class="logo-placeholder">
                <span class="logo-wolf">🐺</span>
                <h1>Fenrir</h1>
            </div>
            <h2>Crie sua conta</h2>
        </div>

        <div id="scanner-area" style="display:none; text-align: center; margin-bottom: 20px;">
            <h3>Escaneie seu rosto para finalizar</h3>
            <div style="color: #00ff66; margin-bottom: 10px; font-weight: bold;" id="statusRosto">Carregando IA...</div>
            <div class="facial-scanner-container" style="height: 200px; border: 2px solid #00ff66; border-radius: 8px; position: relative; overflow: hidden; background: #000;">
                <video id="videoScanner" autoplay muted playsinline style="width: 100%; height: 100%;"></video>
                <canvas id="overlayCanvas" style="position: absolute; top: 0; left: 0;"></canvas>
            </div>
            <button type="button" id="btn-save-face" class="btn-submit" style="background: #0088ff; margin-top: 15px;">GUARDAR BIOMETRIA</button>
        </div>

        <form class="register-form">
            
            <div class="input-group">
                <label for="reg-nome">Nome Completo</label>
                <input type="text" id="reg-nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label for="reg-email">E-mail</label>
                <input type="email" id="reg-email" placeholder="Digite seu melhor e-mail" required>
            </div>

            <div class="input-group">
                <label for="reg-password">Crie uma Senha (mínimo 6 letras/números)</label>
                <input type="password" id="reg-password" placeholder="Crie sua senha" required>
            </div>

            <button type="submit" class="btn-submit">CADASTRAR ALUNO</button>
        </form>

        <div class="login-footer">
            <p>Já é da alcateia? <a href="index.html" class="register-link">Faça login aqui</a></p>
        </div>
        
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>
