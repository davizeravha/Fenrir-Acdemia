﻿<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenrir Academia - Login</title>
    
    <link rel="stylesheet" href="login.css">

    <style>
        /* ==========================================================================
           SCANNER FACIAL SCI-FI
           ========================================================================== */
        .facial-scanner-container {
            position: relative;
            width: 100%;
            height: 220px;
            margin: 0 auto 20px auto;
            border: 2px solid var(--cor-primaria, #00ff66); 
            border-radius: 12px;
            overflow: hidden;
            background-color: #050505;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.1);
        }

        #videoScanner, #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlayCanvas {
            z-index: 5;
        }

        .scanner-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background-color: var(--cor-primaria, #00ff66);
            box-shadow: 0 0 8px var(--cor-primaria, #00ff66);
            position: absolute;
            top: 0;
            animation: scan 2.5s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .status-text {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: var(--cor-primaria, #00ff66);
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.7);
            padding: 4px 0;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="splash-screen">
        <h1 class="splash-howl">AUUUUUU</h1>
    </div>

    <div class="login-container">
        
        <div class="login-header">
            <div class="logo-placeholder">
                <span class="logo-wolf">🐺</span>
                <h1>Fenrir</h1>
                <p class="subtitle">ACADEMIA</p>
            </div>
            <h2>Acesse sua conta</h2>
        </div>

        <div class="facial-scanner-container">
            <video id="videoScanner" autoplay muted playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <div class="scanner-ui">
                <div class="scan-line"></div>
                <p id="statusRosto" class="status-text">CARREGANDO MODELOS IA...</p>
            </div>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="username">Usuário ou E-mail</label>
                <input type="text" id="username" placeholder="Digite seu usuário ou e-mail" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <div class="form-actions">
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-submit">ENTRAR</button>
        </form>

        <div class="login-footer">
            <p>Novo por aqui? <a href="cadastro.html" class="register-link">Crie sua conta</a></p>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBa9KLqX-WsuqzSVGyF73jXujNmvz7QibA",
            authDomain: "academia-fenrir.firebaseapp.com",
            projectId: "academia-fenrir",
            storageBucket: "academia-fenrir.firebasestorage.app",
            messagingSenderId: "174772006900",
            appId: "1:174772006900:web:3a76ecdc3f1dea84a393a1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('videoScanner');
        const statusRosto = document.getElementById('statusRosto');

        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('models'),
            faceapi.nets.faceLandmark68Net.loadFromUri('models'),
            faceapi.nets.faceRecognitionNet.loadFromUri('models')
        ]).then(() => {
            document.querySelector('.splash-screen').style.display = 'none';
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
        });

        video.addEventListener('playing', async () => {
            const canvas = document.getElementById('overlayCanvas');
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);

            let usuarioJaReconhecido = false;

            async function loop() {
                if (video.paused || video.ended) return;
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                                .withFaceLandmarks().withFaceDescriptor();

                if (detection && !usuarioJaReconhecido) {
                    const snapshot = await get(ref(db, 'alunos/'));
                    const alunos = snapshot.val();
                    
                    let reconhecido = false;
                    for (let uid in alunos) {
                        const faceGuardada = new Float32Array(Object.values(alunos[uid].faceDescriptor));
                        
                        if (faceGuardada.length === 128) {
                            const dist = faceapi.euclideanDistance(detection.descriptor, faceGuardada);
                            if (dist < 0.5) {
                                statusRosto.textContent = "BEM-VINDO, " + alunos[uid].nome;
                                
                                // Salva os dados do usuário e redireciona
                                localStorage.setItem('nomeUsuarioFenrir', alunos[uid].nome);
                                localStorage.setItem('emailUsuarioFenrir', alunos[uid].email);
                                localStorage.setItem('uidUsuarioFenrir', uid);
                                
                                reconhecido = true;
                                usuarioJaReconhecido = true;
                                
                                // Redireciona para o dashboard após 2 segundos
                                setTimeout(() => {
                                    window.location.href = "dashboard.html";
                                }, 2000);
                                
                                break;
                            }
                        }
                    }
                    
                    if (!reconhecido) statusRosto.textContent = "ALUNO NÃO RECONHECIDO";
                } else if (detection && usuarioJaReconhecido) {
                    // Já foi reconhecido, não faz mais nada
                } else {
                    statusRosto.textContent = "À PROCURA DE ROSTO...";
                }
                requestAnimationFrame(loop);
            }
            loop();
        });
    </script>

    <script type="module" src="auth.js"></script>
</body>
</html>
