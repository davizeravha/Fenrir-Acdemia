<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenrir Academia - Login</title>
    
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="splash-screen">
        <h1 class="splash-howl">AUUUUUU</h1>
    </div>

    <div class="login-container">
        
        <div class="login-header">
            <div class="logo-placeholder">
                <span class="logo-wolf">🐺</span>
                <h1>Fenrir</h1>
                <p class="subtitle">ACADEMIA</p>
            </div>
            <h2>Acesse sua conta</h2>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="username">Usuário ou E-mail</label>
                <input type="text" id="username" placeholder="Digite seu usuário ou e-mail" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <div class="form-actions">
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-submit">ENTRAR</button>
        </form>

       <div class="login-footer">
    <p>Novo por aqui? <a href="cadastro.html" class="register-link">Crie sua conta</a></p>
</div>
        
    </div>

<script type="module" src="auth.js"></script>
</body>
</html>
